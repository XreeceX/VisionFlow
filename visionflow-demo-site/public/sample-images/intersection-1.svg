<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" />

  <!-- vertical and horizontal roads -->
  <rect x="220" y="0" width="80" height="360" fill="#020617" />
  <rect x="340" y="0" width="80" height="360" fill="#020617" />
  <rect x="0" y="150" width="640" height="60" fill="#020617" />

  <!-- center markings -->
  <rect x="312" y="0" width="4" height="150" fill="#111827" opacity="0.6" />
  <rect x="312" y="210" width="4" height="150" fill="#111827" opacity="0.6" />
  <rect x="0" y="178" width="210" height="4" fill="#111827" opacity="0.6" />
  <rect x="430" y="178" width="210" height="4" fill="#111827" opacity="0.6" />

  <!-- simple car icons (before detection) -->
  <!-- top inbound -->
  <rect x="288" y="70" width="40" height="18" rx="4" fill="#0F172A" />
  <rect x="296" y="76" width="24" height="6" rx="2" fill="#E5E7EB" />

  <!-- bottom inbound -->
  <rect x="288" y="230" width="40" height="18" rx="4" fill="#0F172A" />
  <rect x="296" y="236" width="24" height="6" rx="2" fill="#E5E7EB" />

  <!-- left inbound -->
  <rect x="150" y="168" width="40" height="18" rx="4" fill="#0F172A" />
  <rect x="158" y="174" width="24" height="6" rx="2" fill="#E5E7EB" />

  <!-- right inbound -->
  <rect x="450" y="168" width="40" height="18" rx="4" fill="#0F172A" />
  <rect x="458" y="174" width="24" height="6" rx="2" fill="#E5E7EB" />

  <!-- traffic signal -->
  <rect x="310" y="110" width="8" height="30" rx="2" fill="#111827" />
  <circle cx="314" cy="118" r="5" fill="#4B5563" />
  <circle cx="314" cy="130" r="5" fill="#22C55E" />
  <circle cx="314" cy="142" r="5" fill="#4B5563" />

  <!-- legend text -->
  <text x="24" y="40" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#E5E7EB">
    Before VisionFlow
  </text>
  <text x="24" y="60" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#9CA3AF">
    Multiple vehicles arrive at the junction, but lanes are not yet analysed.
  </text>
</svg>

