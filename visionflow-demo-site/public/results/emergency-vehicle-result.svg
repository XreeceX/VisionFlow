<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg5)" />

  <!-- road -->
  <rect x="0" y="150" width="640" height="60" fill="#030712" />

  <!-- car icon with green detection box -->
  <rect x="258" y="178" width="94" height="34" rx="17" fill="#020617" stroke="#22C55E" stroke-width="2.4" />
  <rect x="270" y="186" width="48" height="8" rx="2" fill="#F97316" />
  <rect x="322" y="186" width="20" height="8" rx="2" fill="#F97316" />
  <rect x="274" y="196" width="40" height="6" rx="1.5" fill="#F9FAFB" />
  <rect x="252" y="188" width="12" height="8" rx="2" fill="#1E293B" />
  <rect x="348" y="188" width="12" height="8" rx="2" fill="#1E293B" />

  <!-- traffic light with green active -->
  <rect x="308" y="132" width="8" height="30" rx="2" fill="#111827" />
  <circle cx="312" cy="142" r="6" fill="#4B5563" />
  <circle cx="312" cy="154" r="6" fill="#4B5563" />
  <circle cx="312" cy="166" r="6" fill="#22C55E" />

  <!-- simple lane status legend -->
  <rect x="52" y="36" width="170" height="50" rx="10" fill="#020617" stroke="#1D4ED8" stroke-width="1.4" />
  <text x="62" y="54" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#E5E7EB">
    Lane 2: GREEN  •  Lanes 1,3: RED
  </text>
  <text x="62" y="70" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#9CA3AF">
    Emergency vehicle lane is prioritised.
  </text>

  <!-- badge -->
  <rect x="420" y="40" width="140" height="30" rx="15" fill="#0F172A" stroke="#F97316" stroke-width="1.6" />
  <text x="430" y="59" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#F9FAFB">
    PRIORITY: EMERGENCY VEHICLE
  </text>
</svg>

