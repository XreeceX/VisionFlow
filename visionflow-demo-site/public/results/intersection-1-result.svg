<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg4)" />

  <!-- vertical and horizontal roads -->
  <rect x="220" y="0" width="80" height="360" fill="#030712" />
  <rect x="340" y="0" width="80" height="360" fill="#030712" />
  <rect x="0" y="150" width="640" height="60" fill="#030712" />

  <!-- center markings -->
  <rect x="312" y="0" width="4" height="150" fill="#111827" opacity="0.6" />
  <rect x="312" y="210" width="4" height="150" fill="#111827" opacity="0.6" />
  <rect x="0" y="178" width="210" height="4" fill="#111827" opacity="0.6" />
  <rect x="430" y="178" width="210" height="4" fill="#111827" opacity="0.6" />

  <!-- cars with green detection boxes -->
  <!-- top inbound -->
  <rect x="284" y="66" width="48" height="26" rx="6" fill="none" stroke="#22C55E" stroke-width="2" />
  <rect x="292" y="74" width="24" height="6" rx="2" fill="#FACC15" />
  <rect x="320" y="74" width="12" height="6" rx="2" fill="#F97316" />

  <!-- bottom inbound -->
  <rect x="284" y="226" width="48" height="26" rx="6" fill="none" stroke="#22C55E" stroke-width="2" />
  <rect x="292" y="234" width="24" height="6" rx="2" fill="#FACC15" />
  <rect x="320" y="234" width="12" height="6" rx="2" fill="#F97316" />

  <!-- left inbound -->
  <rect x="146" y="164" width="48" height="26" rx="6" fill="none" stroke="#22C55E" stroke-width="2" />
  <rect x="154" y="172" width="24" height="6" rx="2" fill="#FACC15" />

  <!-- right inbound -->
  <rect x="446" y="164" width="48" height="26" rx="6" fill="none" stroke="#22C55E" stroke-width="2" />
  <rect x="454" y="172" width="24" height="6" rx="2" fill="#FACC15" />

  <!-- traffic signal with annotated green -->
  <rect x="310" y="110" width="8" height="30" rx="2" fill="#111827" />
  <circle cx="314" cy="118" r="5" fill="#4B5563" />
  <circle cx="314" cy="130" r="5" fill="#22C55E" />
  <circle cx="314" cy="142" r="5" fill="#4B5563" />

  <!-- legend text bubble -->
  <rect x="390" y="280" width="180" height="40" rx="16" fill="#020617" stroke="#1D4ED8" stroke-width="1.5" />
  <text x="402" y="303" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#E5E7EB">
    4 lanes · 4 vehicles · 3 plates
